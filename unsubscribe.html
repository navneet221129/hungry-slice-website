<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unsubscribe — The Hungry Slice</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Anton&display=swap" rel="stylesheet">
  <script src="assets/supabase-js.js"></script>
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0c0c0f;color:#f5f5f5;font-family:'Inter',sans-serif;padding:24px;}
    .card{max-width:440px;width:100%;background:#15151c;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5);}
    .logo{font-family:'Anton',sans-serif;font-size:1.6rem;letter-spacing:1px;margin-bottom:6px;}
    .logo span{color:#ff5500;font-size:.6em;display:block;letter-spacing:3px;}
    h1{font-size:1.3rem;margin:18px 0 8px;}
    p{color:#aaa;line-height:1.6;margin:0 0 18px;}
    .ok{color:#22c55e;} .err{color:#ef4444;}
    a.btn{display:inline-block;margin-top:8px;background:linear-gradient(135deg,#ff5500,#ff7a1a);color:#fff;text-decoration:none;font-weight:700;padding:12px 26px;border-radius:50px;}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span>THE</span>HUNGRY SLICE</div>
    <h1 id="title">Unsubscribing…</h1>
    <p id="msg">One moment while we update your preferences.</p>
    <a class="btn" href="index.html">Back to site</a>
  </div>
  <script>
    (async function(){
      const SUPA_URL='https://wjhbkkthppbadcjnozal.supabase.co';
      const SUPA_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqaGJra3RocHBiYWRjam5vemFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MDQ4MTUsImV4cCI6MjA5NjA4MDgxNX0.VC1rur9Y8lUCo_EW2DK3PJllsgyv6nIQEeEKJjg0IKs';
      const title=document.getElementById('title'), msg=document.getElementById('msg');
      const token=new URLSearchParams(location.search).get('token');
      if(!token){ title.textContent='Invalid link'; title.className='err'; msg.textContent='This unsubscribe link is missing its token.'; return; }
      try{
        const sb=window.supabase.createClient(SUPA_URL,SUPA_ANON);
        const { data, error }=await sb.rpc('unsubscribe_email',{ p_token: token });
        if(error) throw error;
        if(data){ title.textContent='You’re unsubscribed'; title.className='ok'; msg.textContent='You won’t receive offer emails from The Hungry Slice anymore. Changed your mind? Just opt in again at checkout.'; }
        else { title.textContent='Already unsubscribed'; msg.textContent='This email was already unsubscribed (or the link has been used).'; }
      }catch(e){ title.textContent='Something went wrong'; title.className='err'; msg.textContent='Please try again later.'; }
    })();
  </script>
</body>
</html>
