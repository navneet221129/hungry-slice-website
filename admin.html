<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hungry Slice — Order Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css?v=1781700000">
  <script src="assets/supabase-js.js"></script>
</head>
<body>
  <!-- LOGIN -->
  <div id="login-view" class="login-wrap">
    <form id="login-form" class="login-card" autocomplete="on">
      <div class="login-logo"><span>THE</span> HUNGRY SLICE</div>
      <div class="login-sub">Order Console — Staff Login</div>
      <label for="login-email">Email</label>
      <input type="email" id="login-email" autocomplete="username" required placeholder="you@hungryslice.nz">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" autocomplete="current-password" required placeholder="••••••••">
      <button type="submit" id="login-btn">Sign In</button>
      <div id="login-error" class="login-error"></div>
    </form>
  </div>

  <!-- DASHBOARD -->
  <div id="dash-view" class="dash" hidden>
    <header class="dash-head">
      <div class="dash-title">
        <span class="dash-brand">HUNGRY SLICE</span>
        <span class="dash-page">Order Console</span>
      </div>
      <div class="dash-head-right">
        <span id="live-dot" class="live-dot" title="Realtime connection">LIVE</span>
        <button id="sound-toggle" class="ghost-btn" title="Toggle new-order sound">Sound: On</button>
        <button id="refresh-btn" class="ghost-btn">Refresh</button>
        <button id="logout-btn" class="ghost-btn">Sign Out</button>
      </div>
    </header>

    <section class="stats-row">
      <div class="stat"><div class="stat-num" id="stat-today">0</div><div class="stat-lbl">Orders Today</div></div>
      <div class="stat"><div class="stat-num" id="stat-revenue">$0</div><div class="stat-lbl">Revenue Today</div></div>
      <div class="stat"><div class="stat-num" id="stat-active">0</div><div class="stat-lbl">Active Now</div></div>
    </section>

    <nav class="filter-tabs" id="filter-tabs">
      <button class="ftab active" data-f="active">Active</button>
      <button class="ftab" data-f="all">All</button>
      <button class="ftab" data-f="received">Received</button>
      <button class="ftab" data-f="preparing">Preparing</button>
      <button class="ftab" data-f="oven">In Oven</button>
      <button class="ftab" data-f="delivery">Out for Delivery</button>
      <button class="ftab" data-f="delivered">Delivered</button>
    </nav>

    <main id="orders-list" class="orders-list">
      <div class="empty-state">Loading orders…</div>
    </main>
  </div>

  <script src="admin.js?v=1781800000"></script>
</body>
</html>
